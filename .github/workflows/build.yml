name: Build Flare Liquidity Service

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun build src/index.ts --target=node --outdir=dist
