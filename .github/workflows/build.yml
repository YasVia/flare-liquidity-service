name: Build Flare Liquidity Service

on:
  push:
    branches:
      - build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun build src/index.ts --target=node --outdir=dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flare-liquidity-service-build
          path: |
            dist
            package.json
            bun.lock
